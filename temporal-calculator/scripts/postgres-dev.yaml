# Minimal, single-replica, ephemeral-storage Postgres for a throwaway Kind
# dev cluster ONLY. Since the temporalio/helm-charts chart hit v1.0.0 it no
# longer bundles Cassandra/Postgres/MySQL sub-charts at all - "bring your
# own database" is the only supported path now, even for a quick local
# cluster. This is that database.
#
# emptyDir (not a PVC) is deliberate: this cluster is recreated from
# scratch on every `deploy.sh` run anyway (see kind delete/create logic),
# so there's no reason to carry real persistent storage for it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: temporal
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: calculator-dev-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-db-secret
                  key: password
            # Only the default "temporal" DB is created by the postgres
            # image's own init on first boot. "temporal_visibility" is
            # created by the Temporal chart itself via its
            # createDatabase: true setting (see temporal.dev.values.yaml),
            # using this same superuser connection.
            - name: POSTGRES_DB
              value: "temporal"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "temporal"]
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: temporal
  labels:
    app.kubernetes.io/name: postgres
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
